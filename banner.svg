<svg width="1500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117" />
      <stop offset="60%" style="stop-color:#111827" />
      <stop offset="100%" style="stop-color:#1a1b27" />
    </linearGradient>

    <!-- Yellow glow -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EAB308;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#EAB308;stop-opacity:0" />
    </radialGradient>

    <!-- Right side glow -->
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EAB308;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#EAB308;stop-opacity:0" />
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04" />
    </pattern>

    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="overlay" result="blend" />
      <feComposite in="blend" in2="SourceGraphic" operator="in" />
    </filter>

    <!-- Blur for glow effects -->
    <filter id="blur1">
      <feGaussianBlur stdDeviation="35" />
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="20" />
    </filter>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="8" />
    </filter>

    <!-- Text glow -->
    <filter id="textglow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="rounded">
      <rect width="1500" height="500" rx="20" />
    </clipPath>
  </defs>

  <!-- Base -->
  <rect width="1500" height="500" fill="url(#bg)" rx="20" />

  <!-- Grid overlay -->
  <rect width="1500" height="500" fill="url(#grid)" clip-path="url(#rounded)" />

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="250" rx="300" ry="200" fill="url(#glow1)" filter="url(#blur1)" />
  <ellipse cx="1300" cy="250" rx="280" ry="180" fill="url(#glow2)" filter="url(#blur1)" />
  <ellipse cx="750" cy="500" rx="400" ry="150" fill="#EAB308" opacity="0.03" filter="url(#blur1)" />

  <!-- Decorative circles background -->
  <circle cx="1400" cy="60"  r="180" fill="none" stroke="#EAB308" stroke-width="0.6" opacity="0.08" />
  <circle cx="1400" cy="60"  r="130" fill="none" stroke="#EAB308" stroke-width="0.6" opacity="0.06" />
  <circle cx="1400" cy="60"  r="80"  fill="none" stroke="#EAB308" stroke-width="0.6" opacity="0.05" />
  <circle cx="100"  cy="450" r="140" fill="none" stroke="#EAB308" stroke-width="0.6" opacity="0.06" />
  <circle cx="100"  cy="450" r="90"  fill="none" stroke="#EAB308" stroke-width="0.6" opacity="0.04" />

  <!-- Solid glow circles -->
  <circle cx="1400" cy="60"  r="50" fill="#EAB308" opacity="0.06" filter="url(#blur2)" />
  <circle cx="100"  cy="450" r="40" fill="#EAB308" opacity="0.05" filter="url(#blur2)" />
  <circle cx="750"  cy="30"  r="30" fill="#EAB308" opacity="0.04" filter="url(#blur2)" />

  <!-- Scattered dots -->
  <circle cx="950"  cy="80"  r="2.5" fill="#EAB308" opacity="0.4" />
  <circle cx="1000" cy="120" r="1.5" fill="#EAB308" opacity="0.3" />
  <circle cx="980"  cy="160" r="2"   fill="#EAB308" opacity="0.25" />
  <circle cx="1050" cy="95"  r="1.5" fill="#EAB308" opacity="0.35" />
  <circle cx="920"  cy="140" r="2"   fill="#EAB308" opacity="0.2" />
  <circle cx="870"  cy="60"  r="1.5" fill="#ffffff" opacity="0.15" />
  <circle cx="1100" cy="140" r="1.5" fill="#ffffff" opacity="0.1" />
  <circle cx="1150" cy="80"  r="2"   fill="#EAB308" opacity="0.2" />
  <circle cx="1200" cy="110" r="1.5" fill="#EAB308" opacity="0.15" />
  <circle cx="820"  cy="420" r="2"   fill="#EAB308" opacity="0.2" />
  <circle cx="860"  cy="450" r="1.5" fill="#ffffff" opacity="0.1" />
  <circle cx="900"  cy="430" r="2.5" fill="#EAB308" opacity="0.15" />

  <!-- Horizontal lines decoration -->
  <line x1="80"  y1="100" x2="380" y2="100" stroke="#EAB308" stroke-width="0.5" opacity="0.15" />
  <line x1="80"  y1="104" x2="240" y2="104" stroke="#EAB308" stroke-width="0.5" opacity="0.08" />
  <line x1="1120" y1="400" x2="1420" y2="400" stroke="#EAB308" stroke-width="0.5" opacity="0.15" />
  <line x1="1260" y1="404" x2="1420" y2="404" stroke="#EAB308" stroke-width="0.5" opacity="0.08" />

  <!-- Corner brackets top-left -->
  <path d="M 40 40 L 40 90 M 40 40 L 90 40" stroke="#EAB308" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" />
  <!-- Corner brackets bottom-right -->
  <path d="M 1460 460 L 1460 410 M 1460 460 L 1410 460" stroke="#EAB308" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round" />
  <!-- Corner brackets top-right -->
  <path d="M 1460 40 L 1460 90 M 1460 40 L 1410 40" stroke="#EAB308" stroke-width="1" fill="none" opacity="0.2" stroke-linecap="round" />
  <!-- Corner brackets bottom-left -->
  <path d="M 40 460 L 40 410 M 40 460 L 90 460" stroke="#EAB308" stroke-width="1" fill="none" opacity="0.2" stroke-linecap="round" />

  <!-- Left accent bar -->
  <rect x="78" y="170" width="4" height="180" fill="#EAB308" rx="2" opacity="0.9" />
  <rect x="78" y="170" width="4" height="180" fill="#EAB308" rx="2" filter="url(#blur3)" opacity="0.6" />

  <!-- Tag line above name -->
  <text x="100" y="165" font-family="'Courier New', monospace" font-size="14"
        fill="#EAB308" opacity="0.7" letter-spacing="4">
    &lt; DEVELOPER · BUILDER · EXPLORER /&gt;
  </text>

  <!-- Main name -->
  <text x="98" y="290"
        font-family="'Courier New', monospace"
        font-size="96"
        font-weight="bold"
        fill="#ffffff"
        letter-spacing="-1"
        filter="url(#textglow)">MaxLananas</text>

  <!-- Name shadow/glow layer -->
  <text x="98" y="290"
        font-family="'Courier New', monospace"
        font-size="96"
        font-weight="bold"
        fill="#EAB308"
        opacity="0.07"
        letter-spacing="-1">MaxLananas</text>

  <!-- Subtitle -->
  <text x="100" y="345"
        font-family="'Courier New', monospace"
        font-size="22"
        fill="#EAB308"
        opacity="0.9"
        letter-spacing="1">
    kernel hacker · civic tech builder · 16 y/o · Guadeloupe 🌴
  </text>

  <!-- Bottom info row -->
  <text x="100" y="430"
        font-family="'Courier New', monospace"
        font-size="14"
        fill="#ffffff"
        opacity="0.25"
        letter-spacing="2">
    x86 ASM · C · Rust · bootloaders · geospatial · full-stack
  </text>

  <!-- Separator line -->
  <line x1="98" y1="365" x2="860" y2="365" stroke="#EAB308" stroke-width="0.8" opacity="0.2" />

  <!-- Right side — terminal block -->
  <rect x="1050" y="160" width="380" height="220" rx="10"
        fill="#0d1117" stroke="#EAB308" stroke-width="0.8" opacity="0.85" />

  <!-- Terminal top bar -->
  <rect x="1050" y="160" width="380" height="32" rx="10" fill="#161b22" opacity="0.9" />
  <rect x="1050" y="178" width="380" height="14"  fill="#161b22" opacity="0.9" />

  <!-- Terminal dots -->
  <circle cx="1075" cy="176" r="6" fill="#ff5f57" opacity="0.9" />
  <circle cx="1097" cy="176" r="6" fill="#ffbd2e" opacity="0.9" />
  <circle cx="1119" cy="176" r="6" fill="#28c840" opacity="0.9" />

  <!-- Terminal title -->
  <text x="1240" y="181" font-family="'Courier New', monospace" font-size="11"
        fill="#ffffff" opacity="0.3" text-anchor="middle">maxlananas ~ zsh</text>

  <!-- Terminal content -->
  <text x="1070" y="218" font-family="'Courier New', monospace" font-size="13" fill="#EAB308" opacity="0.7">$</text>
  <text x="1085" y="218" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" opacity="0.8"> whoami</text>

  <text x="1070" y="238" font-family="'Courier New', monospace" font-size="12" fill="#6ee7b7" opacity="0.8">→ MaxLananas</text>

  <text x="1070" y="262" font-family="'Courier New', monospace" font-size="13" fill="#EAB308" opacity="0.7">$</text>
  <text x="1085" y="262" font-family="'Courier New', monospace" font-size="13" fill="#ffffff" opacity="0.8"> cat interests.txt</text>

  <text x="1070" y="282" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9" opacity="0.7">kernels, bootloaders, civic tech</text>
  <text x="1070" y="298" font-family="'Courier New', monospace" font-size="11" fill="#c9d1d9" opacity="0.7">geospatial, 1:1 world building</text>

  <text x="1070" y="322" font-family="'Courier New', monospace" font-size="13" fill="#EAB308" opacity="0.7">$</text>
  <!-- Blinking cursor -->
  <rect x="1085" y="310" width="9" height="14" fill="#EAB308" opacity="0.8" rx="1">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite" />
  </rect>

  <!-- Bottom status bar -->
  <rect x="0" y="475" width="1500" height="25" fill="#EAB308" opacity="0.06" clip-path="url(#rounded)" />
  <text x="100" y="492" font-family="'Courier New', monospace" font-size="11"
        fill="#EAB308" opacity="0.4" letter-spacing="3">STATUS: BUILDING</text>
  <text x="1300" y="492" font-family="'Courier New', monospace" font-size="11"
        fill="#EAB308" opacity="0.4" letter-spacing="2">github.com/maxlananas</text>
</svg>
